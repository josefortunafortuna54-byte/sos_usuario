name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Instalar dependências
        run: flutter pub get

      - name: Criar local.properties com MAPS_API_KEY
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> android/local.properties

      - name: Restaurar keystore
        run: |
          mkdir -p android/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore/sos-release-key.jks
          cat > android/keystore.properties << EOF2
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../keystore/sos-release-key.jks
          EOF2
          echo "=== SHA-1 do keystore ==="
          keytool -list -v -keystore android/keystore/sos-release-key.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -alias "${{ secrets.KEY_ALIAS }}" 2>&1 | grep -i "sha1\|alias\|error" || echo "ERRO ao ler keystore"

      - name: Build APK universal
        run: flutter build apk --release

      - name: Verificar assinatura do APK gerado
        run: |
          keytool -printcert -jarfile build/app/outputs/flutter-apk/app-release.apk 2>&1 | grep -i "sha1\|owner" || echo "ERRO ao verificar APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sos-usuario-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
